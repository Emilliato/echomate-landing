name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub Pages serves this repo at /<repo-name>/, not the domain root,
      # so the app needs to know its own base path at build time. Computed
      # from the repo name automatically — works regardless of what this
      # repo ends up being called.
      - name: Build
        run: npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/echomate-landing/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
